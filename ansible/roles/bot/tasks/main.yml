- name: Установить зависимости
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    update_cache: yes

- name: Создать директорию проекта
  file:
    path: "{{ app_dir }}"
    state: directory

- name: Pull bot repository
  git:
    repo: git@github.com:MUstinov77/test_bot_tg.git
    dest: "{{ app_dir }}"
    version: main

- name: Установить зависимости Python
  pip:
    requirements: "{{ app_dir }}/requirements.txt"
    virtualenv: "{{ app_dir }}/.venv"

#- name: Создать systemd сервис
#  template:
#    src: bot.service.j2
#    dest: /etc/systemd/system/bot.service

- name: Перезапустить сервис
  systemd:
    name: bot
    daemon_reload: yes
    enabled: yes
    state: restarted