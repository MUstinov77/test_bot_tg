- name: Start Docker
  service:
    name: docker
    state: started
    enabled: yes

- name: Создать директорию проекта
  file:
    path: "{{ bot_directory }}"
    state: directory

- name: Download raw file
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/MUstinov77/test_bot_tg/main/docker-compose.yml
    dest: "{{ bot_directory }}/docker-compose.yml"

- name: Tear down existing containers
  community.docker.docker_compose_v2:
     project_src: "{{ bot_directory }}"
     state: absent
     remove_images: "local"

- name: Run `docker compose up` again
  community.docker.docker_compose_v2:
    project_src: "{{ bot_directory }}"
    env_files: "{{ bot_directory }}/.env"
  register: output
