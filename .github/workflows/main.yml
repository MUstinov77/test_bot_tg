name: Main test_bot_tg workflow

on:
  push:
    branches:
      - main

jobs:
  build_and_push_backend_to_docker_hub:
    name: Push backend image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to DokcerHub
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/test_bot_tg:latest

  deploy_to_prod:
    needs: build_and_push_backend_to_docker_hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Run Ansible playbook
        uses: dawidd6/action-ansible-playbook@v9
        with:
          playbook: ../ansible/deploy.yml
          inventory: ../ansible/inventory.yml
          vault_password: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
      - name: Send message to telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: Deploy test_bot_tg to servers is completed